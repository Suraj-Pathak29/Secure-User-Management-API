version: "3.8"

services:
  # Service 1: Your FastAPI App
  api:
    build: . #Build from current directory
    container_name: fastapi_container
    ports:
      - "8000:8000" # Map host port 8000 to container port 8000
    environment:
      - DB_HOST=db # Point to the database service name below!
      - DB_PASSWORD=secretpassword
      - DB_USER=postgres
      - DB_NAME=learning_db

    depends_on:
      - db # Wait for DB to start before starting API

  # Service 2: A Fresh PostgreSQL Database (Just for Docker!)
  db:
    image: postgres:15-alpine
    container_name: postgres_container
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secretpassword
      - POSTGRES_DB=learning_db
    ports:
      - "5432:5432" # Allow access from host
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist data even if container deleted

volumes:
  postgres_data:

